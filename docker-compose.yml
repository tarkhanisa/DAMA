version: "3.9"

services:

  api:
    build: ./backend
    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

  db:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_DB: dama

      POSTGRES_USER: dama

      POSTGRES_PASSWORD: dama

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    restart: always

    ports:

      - "6379:6379"

volumes:

  postgres_data: